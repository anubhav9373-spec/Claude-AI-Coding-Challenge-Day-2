<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Environmental Health Intelligence Dashboard Pro</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f1419 0%,#1a1f2e 100%);color:#e0e0e0;overflow-x:hidden}.dashboard{max-width:1600px;margin:0 auto;padding:20px}.header{margin-bottom:40px;padding-bottom:30px;border-bottom:1px solid rgba(255,255,255,0.1)}.header h1{font-size:32px;font-weight:600;color:#fff;margin-bottom:8px}.header p{color:#a0a0a0;font-size:14px}.controls{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-bottom:30px}.controls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}.control-group label{display:block;color:#a0a0a0;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}select,input{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:14px;width:100%}select:focus,input:focus{outline:none;border-color:#00d9ff;background:rgba(0,0,0,0.5)}.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:30px}.metric-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;transition:all 0.3s}.metric-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(0,217,255,0.3)}.metric-label{color:#a0a0a0;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}.metric-value{font-size:32px;font-weight:700;color:#00d9ff}.metric-secondary{color:#60a5fa;font-size:13px;margin-top:8px}.charts-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:16px;margin-bottom:30px}.chart-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px}.chart-card h3{color:#fff;font-size:16px;margin-bottom:16px;font-weight:600}.chart-wrapper{position:relative;height:300px;margin-bottom:12px}canvas{max-height:300px}.city-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:30px}.city-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.3s}.city-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(0,217,255,0.3);transform:translateY(-4px)}.city-name{font-size:18px;font-weight:600;color:#fff;margin-bottom:16px}.city-stat{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}.stat-label{color:#a0a0a0;font-size:13px}.stat-value{font-weight:600;color:#00d9ff;font-size:14px}.risk-badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase}.risk-low{background:rgba(16,185,129,0.2);color:#10b981;border:1px solid rgba(16,185,129,0.4)}.risk-moderate{background:rgba(245,158,11,0.2);color:#f59e0b;border:1px solid rgba(245,158,11,0.4)}.risk-high{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.4)}.aqi-good{background:rgba(16,185,129,0.2);color:#10b981}.aqi-moderate{background:rgba(245,158,11,0.2);color:#f59e0b}.aqi-poor{background:rgba(239,68,68,0.2);color:#ef4444}.report-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px;margin-bottom:30px}.report-title{color:#fff;font-size:18px;font-weight:600;margin-bottom:20px}.grades-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:16px}.grade-box{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:16px;text-align:center}.grade-label{color:#a0a0a0;font-size:12px;text-transform:uppercase;margin-bottom:8px}.grade-value{font-size:28px;font-weight:700;color:#00d9ff}.insights-container{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px;margin-bottom:30px}.insights-title{color:#fff;font-size:18px;font-weight:600;margin-bottom:20px}.insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}.insight-card{background:rgba(0,0,0,0.3);border-left:3px solid #00d9ff;border-radius:8px;padding:16px}.insight-subtitle{color:#00d9ff;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}.insight-content{color:#e0e0e0;font-size:13px;line-height:1.6}.recommendations-container{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px}.recommendations-title{color:#fff;font-size:18px;font-weight:600;margin-bottom:20px}.rec-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;overflow-x:auto}.rec-tab{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);color:#a0a0a0;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;transition:all 0.3s}.rec-tab.active{background:#00d9ff;color:#000;border-color:#00d9ff}.rec-content{background:rgba(0,0,0,0.2);border-radius:8px;padding:16px}.rec-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}.rec-item:last-child{border-bottom:none}.rec-item strong{color:#00d9ff}@media (max-width:768px){.charts-container{grid-template-columns:1fr}.city-grid{grid-template-columns:1fr}.controls-grid{grid-template-columns:1fr}.header h1{font-size:24px}.metrics-grid{grid-template-columns:1fr 1fr}.insight-card{max-width:100%}}</style></head><body><div class="dashboard"><div class="header"><h1>Environmental Health Intelligence Dashboard Pro</h1><p>Real-time environmental analytics for Lucknow, India</p></div><div class="controls"><div class="controls-grid"><div class="control-group"><label>Primary City</label><select id="citySelect" onchange="updateDashboard()"><option value="Lucknow">Lucknow</option><option value="New Delhi">New Delhi</option><option value="Kolkata">Kolkata</option><option value="Mumbai">Mumbai</option><option value="Bangalore">Bangalore</option></select></div><div class="control-group"><label>Compare With</label><select id="compareCity" onchange="updateDashboard()"><option value="">None</option><option value="New Delhi">New Delhi</option><option value="Kolkata">Kolkata</option><option value="Mumbai">Mumbai</option><option value="Bangalore">Bangalore</option></select></div><div class="control-group"><label>AQI Range</label><select id="aqiFilter" onchange="updateDashboard()"><option value="">All</option><option value="0-50">Good (0-50)</option><option value="51-100">Satisfactory (51-100)</option><option value="101-200">Moderate (101-200)</option><option value="201-300">Poor (201-300)</option></select></div><div class="control-group"><label>Health Risk</label><select id="riskFilter" onchange="updateDashboard()"><option value="">All</option><option value="low">Low Risk</option><option value="moderate">Moderate Risk</option><option value="high">High Risk</option></select></div></div></div><div class="metrics-grid" id="metricsGrid"></div><div class="charts-container"><div class="chart-card"><h3>AQI Comparison</h3><div class="chart-wrapper"><canvas id="aqiChart" role="img" aria-label="AQI comparison across cities">AQI levels</canvas></div></div><div class="chart-card"><h3>Pollutant Levels</h3><div class="chart-wrapper"><canvas id="pollutantChart" role="img" aria-label="PM2.5 and PM10 levels">Particulate matter</canvas></div></div></div><div class="insights-container"><div class="insights-title">Key Insights</div><div class="insights-grid" id="insightsGrid"></div></div><div class="city-grid" id="cityGrid"></div><div class="report-card"><div class="report-title">Environmental Health Report Card</div><div id="reportContent"></div></div><div class="recommendations-container"><div class="recommendations-title">Personalized Recommendations</div><div class="rec-tabs" id="recTabs"></div><div class="rec-content" id="recContent"></div></div></div><script>const cityData={Lucknow:{aqi:105,pm25:52,pm10:85,water:58,rank:8,trend:-2},Delhi:{aqi:117,pm25:58,pm10:95,water:52,rank:6,trend:1},'New Delhi':{aqi:117,pm25:58,pm10:95,water:52,rank:6,trend:1},Kolkata:{aqi:139,pm25:68,pm10:110,water:48,rank:1,trend:-5},Mumbai:{aqi:60,pm25:30,pm10:50,water:75,rank:9,trend:2},Bangalore:{aqi:75,pm25:38,pm10:62,water:72,rank:7,trend:3}};let charts={};function calculateMetrics(){const cities=Object.entries(cityData).map(([k,v])=>({name:k,...v}));const aqis=cities.map(c=>c.aqi);const sorted=[...cities].sort((a,b)=>a.aqi-b.aqi);return{avgAQI:Math.round(aqis.reduce((a,b)=>a+b)/aqis.length),medianAQI:Math.round(aqis.sort((a,b)=>a-b)[Math.floor(aqis.length/2)]),highestCity:sorted[sorted.length-1],lowestCity:sorted[0],totalCities:cities.length,cleanestTop3:sorted.slice(0,3),dirtiestTop3:sorted.slice(-3).reverse()}}function getAQIColor(aqi){if(aqi<=50)return{bg:'rgba(16,185,129,0.2)',text:'#10b981',label:'Good'};if(aqi<=100)return{bg:'rgba(132,204,22,0.2)',text:'#84cc16',label:'Satisfactory'};if(aqi<=200)return{bg:'rgba(245,158,11,0.2)',text:'#f59e0b',label:'Moderate'};if(aqi<=300)return{bg:'rgba(239,68,68,0.2)',text:'#ef4444',label:'Poor'};return{bg:'rgba(106,27,154,0.2)',text:'#d946ef',label:'Severe'}}function getHealthScore(city){const data=cityData[city];if(!data)return 50;const aqiScore=Math.max(0,100-data.aqi/3);const waterScore=data.water;return Math.round((aqiScore+waterScore)/2)}function getGrade(score){if(score>=90)return'A+';if(score>=85)return'A';if(score>=80)return'B+';if(score>=70)return'B';if(score>=60)return'C+';if(score>=50)return'C';if(score>=40)return'D';return'F'}function updateMetrics(){const metrics=calculateMetrics();const metricsHtml=`<div class="metric-card"><div class="metric-label">Average AQI</div><div class="metric-value">${metrics.avgAQI}</div><div class="metric-secondary">Across ${metrics.totalCities} cities</div></div><div class="metric-card"><div class="metric-label">Highest AQI City</div><div class="metric-value">${metrics.highestCity.name}</div><div class="metric-secondary">${metrics.highestCity.aqi} AQI</div></div><div class="metric-card"><div class="metric-label">Lowest AQI City</div><div class="metric-value">${metrics.lowestCity.name}</div><div class="metric-secondary">${metrics.lowestCity.aqi} AQI</div></div><div class="metric-card"><div class="metric-label">Environmental Score</div><div class="metric-value">${Math.round((100-metrics.avgAQI/4))}</div><div class="metric-secondary">/100</div></div>`;document.getElementById('metricsGrid').innerHTML=metricsHtml}function updateCharts(){const selectedCity=document.getElementById('citySelect').value;const compareCity=document.getElementById('compareCity').value;const cities=compareCity?[selectedCity,compareCity]:[selectedCity];const data=cities.map(c=>cityData[c]||{aqi:0,pm25:0,pm10:0});if(charts.aqi)charts.aqi.destroy();if(charts.pollutant)charts.pollutant.destroy();const aqiCtx=document.getElementById('aqiChart').getContext('2d');charts.aqi=new Chart(aqiCtx,{type:'bar',data:{labels:cities,datasets:[{label:'AQI Level',data:data.map(d=>d.aqi),backgroundColor:['#00d9ff','#60a5fa'],borderColor:'rgba(255,255,255,0.1)',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:300,ticks:{color:'#a0a0a0'}}},plugins:{legend:{display:false}},layout:{padding:10}}});const pollCtx=document.getElementById('pollutantChart').getContext('2d');charts.pollutant=new Chart(pollCtx,{type:'bar',data:{labels:cities,datasets:[{label:'PM2.5',data:data.map(d=>d.pm25),backgroundColor:'#ef5350',borderColor:'rgba(255,255,255,0.1)',borderWidth:1},{label:'PM10',data:data.map(d=>d.pm10),backgroundColor:'#f59e0b',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,ticks:{color:'#a0a0a0'}}},plugins:{legend:{display:true,labels:{color:'#a0a0a0'}}},layout:{padding:10}}})}function updateInsights(){const metrics=calculateMetrics();const insightsHtml=`<div class="insight-card"><div class="insight-subtitle">Top 3 Cleanest Cities</div><div class="insight-content"><strong>${metrics.cleanestTop3[0].name}</strong> (${metrics.cleanestTop3[0].aqi})<br><strong>${metrics.cleanestTop3[1].name}</strong> (${metrics.cleanestTop3[1].aqi})<br><strong>${metrics.cleanestTop3[2].name}</strong> (${metrics.cleanestTop3[2].aqi})</div></div><div class="insight-card"><div class="insight-subtitle">Top 3 Most Polluted Cities</div><div class="insight-content"><strong>${metrics.dirtiestTop3[0].name}</strong> (${metrics.dirtiestTop3[0].aqi})<br><strong>${metrics.dirtiestTop3[1].name}</strong> (${metrics.dirtiestTop3[1].aqi})<br><strong>${metrics.dirtiestTop3[2].name}</strong> (${metrics.dirtiestTop3[2].aqi})</div></div><div class="insight-card"><div class="insight-subtitle">Most Surprising Observation</div><div class="insight-content">Mumbai maintains excellent air quality (60 AQI) despite being India's most dense megacity. The Arabian Sea provides natural air purification through sea breezes.</div></div>`;document.getElementById('insightsGrid').innerHTML=insightsHtml}function updateCityCards(){const selectedCity=document.getElementById('citySelect').value;const compareCity=document.getElementById('compareCity').value;const citiesToShow=compareCity?[selectedCity,compareCity]:[selectedCity];const html=citiesToShow.map(city=>{const d=cityData[city];const color=getAQIColor(d.aqi);const healthScore=getHealthScore(city);return`<div class="city-card"><div class="city-name">${city}</div><div class="city-stat"><span class="stat-label">AQI</span><span class="stat-value" style="color:${color.text}">${d.aqi}</span></div><div class="city-stat"><span class="stat-label">PM2.5</span><span class="stat-value">${d.pm25} μg/m³</span></div><div class="city-stat"><span class="stat-label">PM10</span><span class="stat-value">${d.pm10} μg/m³</span></div><div class="city-stat"><span class="stat-label">Health Risk</span><span class="risk-badge ${d.aqi>150?'risk-high':d.aqi>100?'risk-moderate':'risk-low'}">${d.aqi>150?'High':d.aqi>100?'Moderate':'Low'}</span></div><div class="city-stat"><span class="stat-label">Water Quality</span><span class="stat-value">${d.water}/100</span></div><div class="city-stat" style="border-bottom:none"><span class="stat-label">Health Score</span><span class="stat-value">${healthScore}/100</span></div></div>`}).join('');document.getElementById('cityGrid').innerHTML=html}function updateReportCard(){const selectedCity=document.getElementById('citySelect').value;const d=cityData[selectedCity];const airScore=Math.max(0,100-d.aqi/3);const waterScore=d.water;const overallScore=Math.round((airScore+waterScore)/2);const html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div><p style="color:#a0a0a0;margin-bottom:12px">Overall Environmental Score</p><p style="font-size:28px;font-weight:700;color:#00d9ff">${overallScore}/100</p></div><div><p style="color:#a0a0a0;margin-bottom:12px">Grade</p><p style="font-size:28px;font-weight:700;color:#00d9ff">${getGrade(overallScore)}</p></div></div><div class="grades-grid" style="margin-top:20px"><div class="grade-box"><div class="grade-label">Air Quality</div><div class="grade-value">${getGrade(airScore)}</div></div><div class="grade-box"><div class="grade-label">Water Quality</div><div class="grade-value">${getGrade(waterScore)}</div></div><div class="grade-box"><div class="grade-label">Hair Risk</div><div class="grade-value">${getGrade(100-d.water)}</div></div><div class="grade-box"><div class="grade-label">Skin Risk</div><div class="grade-value">${getGrade(Math.max(50,100-d.aqi/2))}</div></div></div>`;document.getElementById('reportContent').innerHTML=html}function updateRecommendations(){const selectedCity=document.getElementById('citySelect').value;const d=cityData[selectedCity];const tabs=['daily','indoor','outdoor','hair','skin','water'];const tabsHtml=tabs.map(tab=>`<div class="rec-tab ${tab==='daily'?'active':''}" onclick="switchTab('${tab}')">${tab.charAt(0).toUpperCase()+tab.slice(1)}</div>`).join('');const recs={daily:`<div class="rec-item"><strong>Check AQI Daily:</strong> When AQI > 150, limit outdoor exposure.</div><div class="rec-item"><strong>Optimal Hours:</strong> Exercise 6-8 AM or 6-8 PM when pollution is lowest.</div><div class="rec-item"><strong>Stay Hydrated:</strong> Drink 3.5-4L water daily to flush toxins.</div>`,indoor:`<div class="rec-item"><strong>Install Air Purifier:</strong> Use HEPA filter for 8+ hours daily.</div><div class="rec-item"><strong>Indoor Plants:</strong> Deploy spider plants and money plants for air purification.</div><div class="rec-item"><strong>Keep Windows Closed:</strong> When AQI > 150, restrict ventilation to 20 mins.</div>`,outdoor:`<div class="rec-item"><strong>Wear N95 Masks:</strong> When AQI exceeds 100 during outdoor activities.</div><div class="rec-item"><strong>Avoid Rush Hours:</strong> Skip midday (10 AM - 4 PM) outdoor exposure.</div><div class="rec-item"><strong>Choose Green Routes:</strong> Parks and green areas reduce ground-level AQI by 10-20%.</div>`,hair:`<div class="rec-item"><strong>Wash 2-3 Times Weekly:</strong> Avoid daily washing to retain natural oils.</div><div class="rec-item"><strong>Water Quality Impact:</strong> Hard water causes brittleness. Use RO water rinse.</div><div class="rec-item"><strong>Oil Massage Pre-Wash:</strong> Coconut oil provides protection from PM2.5.</div>`,skin:`<div class="rec-item"><strong>Double Cleanse Daily:</strong> Oil cleanser first, then water-based cleanser.</div><div class="rec-item"><strong>Use Antioxidant Serum:</strong> Vitamin C serums counteract pollution damage.</div><div class="rec-item"><strong>Apply SPF Daily:</strong> Even on cloudy days, UV + pollution = skin damage.</div>`,water:`<div class="rec-item"><strong>Install RO System:</strong> TDS levels require treatment for safe drinking.</div><div class="rec-item"><strong>Quarterly Testing:</strong> Monitor hardness and bacterial contamination.</div><div class="rec-item"><strong>Increase Water Intake:</strong> 3.5-4L daily with hard water for hydration.</div>`};document.getElementById('recTabs').innerHTML=tabsHtml;document.getElementById('recContent').innerHTML=recs.daily}function switchTab(tab){document.querySelectorAll('.rec-tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');const recs={daily:`<div class="rec-item"><strong>Check AQI Daily:</strong> When AQI > 150, limit outdoor exposure.</div><div class="rec-item"><strong>Optimal Hours:</strong> Exercise 6-8 AM or 6-8 PM when pollution is lowest.</div><div class="rec-item"><strong>Stay Hydrated:</strong> Drink 3.5-4L water daily to flush toxins.</div>`,indoor:`<div class="rec-item"><strong>Install Air Purifier:</strong> Use HEPA filter for 8+ hours daily.</div><div class="rec-item"><strong>Indoor Plants:</strong> Deploy spider plants and money plants for air purification.</div><div class="rec-item"><strong>Keep Windows Closed:</strong> When AQI > 150, restrict ventilation to 20 mins.</div>`,outdoor:`<div class="rec-item"><strong>Wear N95 Masks:</strong> When AQI exceeds 100 during outdoor activities.</div><div class="rec-item"><strong>Avoid Rush Hours:</strong> Skip midday (10 AM - 4 PM) outdoor exposure.</div><div class="rec-item"><strong>Choose Green Routes:</strong> Parks and green areas reduce ground-level AQI by 10-20%.</div>`,hair:`<div class="rec-item"><strong>Wash 2-3 Times Weekly:</strong> Avoid daily washing to retain natural oils.</div><div class="rec-item"><strong>Water Quality Impact:</strong> Hard water causes brittleness. Use RO water rinse.</div><div class="rec-item"><strong>Oil Massage Pre-Wash:</strong> Coconut oil provides protection from PM2.5.</div>`,skin:`<div class="rec-item"><strong>Double Cleanse Daily:</strong> Oil cleanser first, then water-based cleanser.</div><div class="rec-item"><strong>Use Antioxidant Serum:</strong> Vitamin C serums counteract pollution damage.</div><div class="rec-item"><strong>Apply SPF Daily:</strong> Even on cloudy days, UV + pollution = skin damage.</div>`,water:`<div class="rec-item"><strong>Install RO System:</strong> TDS levels require treatment for safe drinking.</div><div class="rec-item"><strong>Quarterly Testing:</strong> Monitor hardness and bacterial contamination.</div><div class="rec-item"><strong>Increase Water Intake:</strong> 3.5-4L daily with hard water for hydration.</div>`};document.getElementById('recContent').innerHTML=recs[tab]}function updateDashboard(){updateMetrics();updateCharts();updateInsights();updateCityCards();updateReportCard();updateRecommendations()}updateDashboard()</script></body></html>
